services:
  kafka:
    image: apache/kafka-native
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CLUSTER_ID: mkU3O9S6T76iI4XvU6fK8w
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"


  kafka-init:
    image: apache/kafka-native
    depends_on:
      - kafka
    entrypoint: ["/bin/sh", "-lc"]
    command: "/opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9093 --partitions 1 --replication-factor 1 --topic planes.opensky.updates && /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9093 --partitions 1 --replication-factor 1 --topic planes.opensky.errors && /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9093 --partitions 1 --replication-factor 1 --topic planes.weather.impacts"


  kafka-ui:
    image: kafbat/kafka-ui:main
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
    depends_on:
      - kafka
      
  api-gateway:
    build:
      context: ./server
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      KAFKA_BROKERS: kafka:9093
      KAFKA_CLIENT_ID: api-gateway
      KAFKA_CONSUMER_GROUP_ID: api-gateway-group
      KAFKA_TOPIC_PLANES_UPDATES: planes.opensky.updates
      KAFKA_TOPIC_WEATHER_IMPACTS: planes.weather.impacts
      WEATHER_ENRICHER_BASE_URL: http://weather-enricher:4002
    depends_on:
      - kafka
      - kafka-init
      - weather-enricher

  plane-fetcher:
    build:
      context: ./services/plane-fetcher
    environment:
      TRACKED_ICAO24S: ${TRACKED_ICAO24S:-4ca2b1}
      POLL_MS: ${POLL_MS:-10000}
      KAFKA_BROKERS: kafka:9093
      KAFKA_CLIENT_ID: plane-fetcher
      KAFKA_TOPIC_PLANES_UPDATES: planes.opensky.updates
      KAFKA_TOPIC_PLANES_ERRORS: planes.opensky.errors
      OPENSKY_CLIENT_ID: ${OPENSKY_CLIENT_ID:-}
      OPENSKY_CLIENT_SECRET: ${OPENSKY_CLIENT_SECRET:-}
    depends_on:
      - kafka
      - kafka-init

  weather-enricher:
    build:
      context: ./services/weather-enricher
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      NOAA_ALERTS_BASE_URL: https://api.weather.gov
      NOAA_USER_AGENT: "cmpe-272-weather-enricher/1.0 (contact: team@example.com)"
      WEATHER_CACHE_TTL_MS: ${WEATHER_CACHE_TTL_MS:-30000}
      ENABLE_SEATTLE_THUNDERSTORM_DEMO: ${ENABLE_SEATTLE_THUNDERSTORM_DEMO:-true}
  analytics:
    build:
      context: ./services/analytics
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      KAFKA_BROKERS: kafka:9093
      KAFKA_CLIENT_ID: analytics
      KAFKA_CONSUMER_GROUP_ID: analytics-group
      KAFKA_TOPIC_PLANES_UPDATES: planes.opensky.updates
    depends_on:
      - kafka
      - kafka-init
